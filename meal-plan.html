    function normalizeFractions(s) {
      // Replace unicode fraction chars

      s = s.replace(/(\d+)\s+(0\.\d+)/g, (_, a, b) => String(parseFloat(a) + parseFloat(b)));
      // Ranges: "3–4" or "3-4" → keep lower
      s = s.replace(/(\d+(?:\.\d+)?)\s*[–\-]\s*\d+(?:\.\d+)?(?!\s*(?:inch|cm|mm))/g, '$1');
      return s;
    }

    function parseIngredient(raw) {
      let s = normalizeFractions(raw);
      // Strip parentheticals
      s = s.replace(/\(.*?\)/g, '').replace(/\s+/g, ' ').trim();
      // Strip trailing qualifiers
      s = s.replace(/,?\s*(to taste|for serving|for garnish|optional|as needed|if desired|if using|adjust to taste)\s*$/i, '').trim();

      // Extract leading number
      const numMatch = s.match(/^(\d+(?:\.\d+)?)\s*/);
      let qty = null;
      if (numMatch) {
        qty = parseFloat(numMatch[1]);
        s = s.slice(numMatch[0].length);
      }

      // Extract unit
      let unit = null;
      const unitMatch = s.match(/^([a-zA-Z]+)\s+/);
      if (unitMatch) {
        const cand = unitMatch[1].toLowerCase();
        if (UNIT_MAP[cand] !== undefined) {
          unit = UNIT_MAP[cand];
          s = s.slice(unitMatch[0].length);
        }
      }
      if (qty !== null && unit === null) unit = 'count';

      // Extract name: strip prep notes after comma, strip leading prep words
      let name = s.replace(PREP_RE, '').trim().toLowerCase();
      name = name.replace(LEADING_PREP_RE, '');

      // Handle "garlic cloves" → unit=clove
      if (name.endsWith(' cloves') || name.endsWith(' clove')) {
        name = name.replace(/ cloves?$/, '').trim();
        unit = 'clove';
      }

      // Strip piece/knob size descriptors (e.g. "thumb-sized piece ginger", "inch piece fresh ginger")
      // and null out qty — a knob of ginger isn't a useful shopping quantity
      const pieceRe = /^(?:(?:\d+(?:\.\d+)?\s*-?\s*)?(?:inch|cm)\s+)?(?:thumb-?sized?\s+)?(?:piece|knob|chunk)s?\s+(?:of\s+)?(?:fresh\s+)?/i;
      if (pieceRe.test(name)) {
        name = name.replace(pieceRe, '').trim();
        qty = null;
        unit = null;
      }

      // Apply synonyms
      name = SYNONYMS[name] || name;

      // Strip any remaining trailing punctuation/whitespace
      name = name.replace(/[,.]$/, '').trim();

      return { qty, unit, name };
    }

    function isPantry(unit, name) {
      if (unit === 'tbsp' || unit === 'tsp' || unit === 'can') return true;
      return PANTRY_KEYWORDS.some(k => name.includes(k));
    }

    // ── AGGREGATION ───────────────────────────────────────────────────────────

    function buildShoppingList(recipes) {
      const freshMap = new Map();   // key: `${name}::${unit}` → {name, unit, qty, recipes: Set}
      const pantryMap = new Map();  // name → Set<title>

      recipes.forEach(recipe => {
        recipe.ingredients.forEach(group => {
          group.items.forEach(raw => {
            const { qty, unit, name } = parseIngredient(raw);
            if (!name) return;

            if (isPantry(unit, name)) {
              if (!pantryMap.has(name)) pantryMap.set(name, new Set());
              pantryMap.get(name).add(recipe.title);
            } else {
              const key = `${name}::${unit || 'none'}`;
              if (freshMap.has(key)) {
                const entry = freshMap.get(key);
                if (entry.qty !== null && qty !== null) entry.qty += qty;
                entry.recipes.add(recipe.title);
              } else {
                freshMap.set(key, { name, unit, qty: qty !== null ? qty : null, recipes: new Set([recipe.title]) });
              }
            }
          });
        });
      });

      // Convert metric units after aggregation, then separate qty vs no-qty buckets
      const withQty = [];
      const noQtyMap = new Map();  // name → Set<title>

      freshMap.forEach(entry => {
        let { name, unit, qty, recipes } = entry;
        if (qty !== null && (unit === 'g' || unit === 'kg')) {
          ({ qty, unit } = toUSUnits(qty, unit));
        }
        if (qty === null) {
          if (!noQtyMap.has(name)) noQtyMap.set(name, new Set());
          recipes.forEach(r => noQtyMap.get(name).add(r));
        } else {
          withQty.push({ name, unit, qty, recipes });
        }
      });

      // Only show no-qty names that aren't already covered by a qty entry
      const withQtyNames = new Set(withQty.map(i => i.name));
      const noQty = [];
      noQtyMap.forEach((recipeSet, name) => {
        if (!withQtyNames.has(name)) noQty.push({ name, unit: null, qty: null, recipes: recipeSet });
      });

      const fresh = [...withQty, ...noQty].sort((a, b) => a.name.localeCompare(b.name));
      const pantry = Array.from(pantryMap.entries())
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([name, recipeSet]) => ({ name, recipes: recipeSet }));
      return { fresh, pantry };
    }

    // ── NUMBER FORMATTING ─────────────────────────────────────────────────────

    function fmtFrac(f) {
      const pairs = [[0.125,'⅛'],[0.25,'¼'],[0.333,'⅓'],[0.375,'⅜'],[0.5,'½'],[0.625,'⅝'],[0.667,'⅔'],[0.75,'¾'],[0.875,'⅞']];
      for (const [val, sym] of pairs) if (Math.abs(f - val) < 0.02) return sym;
      return null;
    }

    function fmtNum(n) {
      if (n === null) return '';
      const whole = Math.floor(n);
      const frac = Math.round((n - whole) * 1000) / 1000;
      if (frac === 0) return String(whole);
      const fracStr = fmtFrac(frac);
      if (whole === 0) return fracStr || n.toFixed(2);
      return whole + (fracStr || ('.' + Math.round(frac * 100)));
    }

    function toUSUnits(qty, unit) {
      if (unit === 'g') {
        if (qty < 100) return { qty: null, unit: null };
        if (qty < 450) {
          const oz = Math.round(qty * 0.035274 * 2) / 2;
          return { qty: oz, unit: 'oz' };
        }
        const lb = Math.round(qty * 0.0022046 * 4) / 4;
        return { qty: lb, unit: 'lb' };
      }
      if (unit === 'kg') {
        const lb = Math.round(qty * 2.20462 * 4) / 4;
        return { qty: lb, unit: 'lb' };
      }
      return { qty, unit };
    }

    function formatFreshItem(item) {
      const { name, unit, qty, recipes } = item;
      const cap = name.charAt(0).toUpperCase() + name.slice(1);
      let text;
      if (qty === null || unit === null) text = cap;
      else if (unit === 'count') text = `${fmtNum(qty)} ${name}`;
      else if (unit === 'clove') text = `${fmtNum(qty)} ${qty === 1 ? 'clove' : 'cloves'} ${name}`;
      else text = `${fmtNum(qty)} ${unit} ${name}`;
      if (recipes && recipes.size > 0) {
        text += `<span class="item-source">(${Array.from(recipes).join(' · ')})</span>`;
      }
      return text;
    }

    // ── RENDER ────────────────────────────────────────────────────────────────

    function render() {
      const params = new URLSearchParams(location.search);
      const ids = (params.get('ids') || '').split(',').filter(Boolean);

      if (ids.length === 0) {
        document.getElementById('mp-content').innerHTML = '<div class="mp-empty">No recipes selected.</div>';
        document.getElementById('mp-subtitle').textContent = '';
        return;
      }

      const selected = ids.map(id => recipeData.find(r => r.id === id)).filter(Boolean);

      if (selected.length === 0) {
        document.getElementById('mp-content').innerHTML = '<div class="mp-empty">Recipes not found.</div>';
        return;
      }

      document.title = 'Shopping List — Verified Recipes';
      document.getElementById('mp-subtitle').textContent =
        `${selected.length} ${selected.length === 1 ? 'recipe' : 'recipes'} selected`;
      document.getElementById('mp-recipe-names').textContent =
        selected.map(r => r.title).join(' · ');

      const { fresh, pantry } = buildShoppingList(selected);
      const totalCount = fresh.length + pantry.length;

      let html = '';

      if (fresh.length > 0) {
        html += `<div class="mp-section">
          <p class="mp-section-title">Fresh &amp; Produce</p>
          <ul class="mp-list">`;
        fresh.forEach(item => {
          html += `<li>${formatFreshItem(item)}</li>`;
        });
        html += `</ul></div>`;
      }

      if (pantry.length > 0) {
        html += `<div class="mp-section">
          <p class="mp-section-title">Pantry, Sauces &amp; Spices</p>
          <ul class="mp-list">`;
        pantry.forEach(({ name, recipes }) => {
          const cap = name.charAt(0).toUpperCase() + name.slice(1);
          const src = recipes && recipes.size > 0
            ? `<span class="item-source">(${Array.from(recipes).join(' · ')})</span>`
            : '';
          html += `<li>${cap}${src}</li>`;
        });
        html += `</ul></div>`;
      }

      if (totalCount === 0) {
        html = '<div class="mp-empty">No ingredients found.</div>';
      }

      document.getElementById('mp-content').innerHTML = html;

      const storageKey = 'mp-checked::' + (params.get('ids') || '');
      const saved = new Set(JSON.parse(localStorage.getItem(storageKey) || '[]'));

      document.querySelectorAll('.mp-list li').forEach((li, i) => {
        if (saved.has(i)) li.classList.add('checked');
        li.addEventListener('click', () => {
          li.classList.toggle('checked');
          const checked = Array.from(document.querySelectorAll('.mp-list li'))
            .map((el, idx) => el.classList.contains('checked') ? idx : -1)
            .filter(idx => idx !== -1);
          localStorage.setItem(storageKey, JSON.stringify(checked));
        });
      });
    }

    render();
  </script>

</body>
</html>
